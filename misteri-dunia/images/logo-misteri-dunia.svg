<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  
  <!-- Background lingkaran gelap -->
  <circle cx="150" cy="150" r="145" fill="#1a1a2e" stroke="#c9a84c" stroke-width="3"/>
  
  <!-- Lingkaran dalam dekoratif -->
  <circle cx="150" cy="150" r="125" fill="none" stroke="#c9a84c" stroke-width="1" stroke-dasharray="6 4" opacity="0.5"/>

  <!-- Bintang-bintang kecil -->
  <circle cx="60"  cy="70"  r="2" fill="white" opacity="0.8"/>
  <circle cx="90"  cy="45"  r="1.5" fill="white" opacity="0.6"/>
  <circle cx="200" cy="55"  r="2" fill="white" opacity="0.9"/>
  <circle cx="240" cy="80"  r="1.5" fill="white" opacity="0.7"/>
  <circle cx="255" cy="120" r="2" fill="white" opacity="0.5"/>
  <circle cx="50"  cy="150" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="40"  cy="200" r="2" fill="white" opacity="0.7"/>
  <circle cx="260" cy="190" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="220" cy="240" r="2" fill="white" opacity="0.6"/>
  <circle cx="75"  cy="240" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="130" cy="40"  r="1" fill="white" opacity="0.7"/>
  <circle cx="170" cy="35"  r="1.5" fill="white" opacity="0.9"/>

  <!-- Bulan sabit -->
  <circle cx="150" cy="115" r="48" fill="#c9a84c"/>
  <circle cx="168" cy="105" r="40" fill="#1a1a2e"/>

  <!-- Mata di tengah bulan -->
  <ellipse cx="138" cy="118" rx="10" ry="13" fill="#1a1a2e"/>
  <ellipse cx="138" cy="118" rx="7"  ry="9"  fill="#c9a84c"/>
  <circle  cx="138" cy="118" r="4"   fill="#1a1a2e"/>
  <circle  cx="140" cy="115" r="1.5" fill="white" opacity="0.9"/>

  <!-- Teks MISTERI -->
  <text x="150" y="198"
        font-family="Georgia, serif"
        font-size="26"
        font-weight="bold"
        fill="#c9a84c"
        text-anchor="middle"
        letter-spacing="5">MISTERI</text>

  <!-- Garis dekoratif kiri kanan teks -->
  <line x1="42"  y1="210" x2="102" y2="210" stroke="#c9a84c" stroke-width="1" opacity="0.6"/>
  <line x1="198" y1="210" x2="258" y2="210" stroke="#c9a84c" stroke-width="1" opacity="0.6"/>

  <!-- Teks DUNIA -->
  <text x="150" y="228"
        font-family="Georgia, serif"
        font-size="18"
        fill="white"
        text-anchor="middle"
        letter-spacing="8"
        opacity="0.9">DUNIA</text>

  <!-- Titik dekoratif bawah -->
  <circle cx="150" cy="252" r="3" fill="#c9a84c"/>
  <circle cx="138" cy="252" r="2" fill="#c9a84c" opacity="0.5"/>
  <circle cx="162" cy="252" r="2" fill="#c9a84c" opacity="0.5"/>

</svg>
